<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Erro</title>
</head>

<body>
<section class="error-page">
    <h1>Algo deu errado D:</h1>
    <p>Estamos trabalhando nisso. Volte mais tarde.</p>
    <a class="button" th:href="@{/}">back home</a>

    <div class="admin-error-panel" sec:authorize="hasRole('ADMIN')">
        <button type="button" id="errorDetailsToggle" aria-expanded="false">show error details</button>

        <dl id="errorDetails" class="error-details" hidden>
            <div>
                <dt>Status</dt>
                <dd th:text="${status ?: 'unknown'}">500</dd>
            </div>
            <div>
                <dt>Error</dt>
                <dd th:text="${error ?: 'unknown'}">Internal Server Error</dd>
            </div>
            <div>
                <dt>Path</dt>
                <dd th:text="${path ?: 'unknown'}">/</dd>
            </div>
            <div>
                <dt>Message</dt>
                <dd th:text="${message ?: 'no message'}">message</dd>
            </div>
            <div>
                <dt>Exception</dt>
                <dd th:text="${exception ?: 'none'}">exception</dd>
            </div>
            <div>
                <dt>Timestamp</dt>
                <dd th:text="${timestamp ?: 'unknown'}">timestamp</dd>
            </div>
        </dl>
    </div>

    <script sec:authorize="hasRole('ADMIN')">
        const toggle = document.getElementById('errorDetailsToggle');
        const details = document.getElementById('errorDetails');

        toggle?.addEventListener('click', () => {
            const expanded = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', String(!expanded));
            toggle.textContent = expanded ? 'show error details' : 'hide error details';
            details.hidden = expanded;
        });
    </script>
</section>
</body>
</html>
