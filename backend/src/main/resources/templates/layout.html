<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)" lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" th:content="${siteDescription}">

    <meta property="og:type" content="website">
    <meta property="og:site_name" th:content="${siteName}">
    <meta property="og:title" th:content="${siteName}">
    <meta property="og:description" th:content="${siteDescription}">
    <meta property="og:url" th:content="${siteUrl}">
    <meta property="og:image" th:content="${siteImage}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" th:content="${siteName}">
    <meta name="twitter:description" th:content="${siteDescription}">
    <meta name="twitter:image" th:content="${siteImage}">
    <meta name="theme-color" content="#b31312">

    <title th:replace="${title}">Esther</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<main>
    <div th:replace="${content}"></div>
</main>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
