<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Stars - Observatory</title>
</head>
<body>
<section class="observatory-page">
    <div class="observatory-hero compact">
        <p class="observatory-kicker">Observatory</p>
        <h1>Stars</h1>
        <p>tasks inside Star Systems, from Nebula to Done.</p>
    </div>
    <nav class="observatory-tabs">
        <a th:href="@{/observatory}">Mission Control</a>
        <a th:href="@{/observatory/stars}">all</a>
        <a th:each="status : ${statuses}" th:href="@{/observatory/stars(status=${status})}" th:text="${status}">READY</a>
        <a th:href="@{/observatory/pulsars}">Pulsars</a>
        <a th:href="@{/observatory/chart-course}">Chart Course</a>
    </nav>
    <div class="clock-setup">
        <span>Clock setup</span>
        <a class="button" th:href="@{/observatory/stars(timeFormat=${timeFormatToggle})}" th:text="${timeFormat}">24h</a>
    </div>

    <form class="observatory-form" th:action="${editId == null} ? @{/observatory/stars} : @{/observatory/stars/{publicId}(publicId=${editId})}" th:object="${star}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <h2 th:text="${editId == null} ? 'Add Star' : 'Edit Star'">Add Star</h2>
        <fieldset class="star-form-section">
            <legend>Identity</legend>
            <label>Title <input th:field="*{title}" required></label>
            <label>Star System
                <select name="starSystemId">
                    <option value="">Nebula / no system</option>
                    <option th:each="starSystem : ${starSystems}" th:value="${starSystem.id}" th:selected="${star.starSystem != null and star.starSystem.id == starSystem.id}" th:text="${starSystem.name}"></option>
                </select>
            </label>
            <label>Status <select th:field="*{status}"><option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option></select></label>
            <label>Priority <select th:field="*{priority}"><option th:each="priority : ${priorities}" th:value="${priority}" th:text="${priority}"></option></select></label>
            <label>Energy <select th:field="*{energyType}"><option th:each="energyType : ${energyTypes}" th:value="${energyType}" th:text="${energyType}"></option></select></label>
        </fieldset>
        <fieldset class="star-form-section flight-plan">
            <legend>Flight Plan</legend>
            <label>Due date <input type="date" lang="pt-BR" th:field="*{dueDate}"></label>
            <label>Estimated minutes <input type="number" min="0" th:field="*{estimatedMinutes}"></label>
            <div class="observatory-datetime-parts">
                <label>Start date <input class="observatory-date-entry" type="date" lang="pt-BR" th:value="${star.scheduledStart != null ? #temporals.format(star.scheduledStart, 'yyyy-MM-dd') : ''}"></label>
                <label>Start time <input th:type="${twelveHourClock} ? 'time' : 'text'" th:classappend="${!twelveHourClock} ? 'observatory-time-entry'" inputmode="numeric" pattern="[0-2][0-9]:[0-5][0-9]" placeholder="HH:mm" lang="en-GB" th:value="${star.scheduledStart != null ? #temporals.format(star.scheduledStart, 'HH:mm') : ''}"></label>
                <input type="hidden" th:field="*{scheduledStart}">
            </div>
            <div class="observatory-datetime-parts">
                <label>End date <input class="observatory-date-entry" type="date" lang="pt-BR" th:value="${star.scheduledEnd != null ? #temporals.format(star.scheduledEnd, 'yyyy-MM-dd') : ''}"></label>
                <label>End time <input th:type="${twelveHourClock} ? 'time' : 'text'" th:classappend="${!twelveHourClock} ? 'observatory-time-entry'" inputmode="numeric" pattern="[0-2][0-9]:[0-5][0-9]" placeholder="HH:mm" lang="en-GB" th:value="${star.scheduledEnd != null ? #temporals.format(star.scheduledEnd, 'HH:mm') : ''}"></label>
                <input type="hidden" th:field="*{scheduledEnd}">
            </div>
        </fieldset>
        <fieldset class="star-form-section notes">
            <legend>Notes</legend>
            <label>Description <textarea th:field="*{description}"></textarea></label>
        </fieldset>
        <button class="button primary" type="submit" th:text="${editId == null} ? 'Add Star' : 'Save Star'">Add Star</button>
    </form>

    <div class="observatory-table">
        <article class="observatory-row" th:each="star : ${stars}">
            <div>
                <strong th:text="${star.title}">Star</strong>
                <span th:text="${star.starSystem != null ? star.starSystem.name : 'Nebula'}">Star System</span>
                <em th:text="|${star.status} / ${star.priority}|">READY</em>
            </div>
            <div class="row-actions">
                <a class="button" th:href="@{/observatory/stars/{publicId}/edit(publicId=${star.publicId})}">Edit</a>
                <form th:if="${star.status.name() != 'DONE'}" th:action="@{/observatory/stars/{publicId}/complete(publicId=${star.publicId})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /><button type="submit">Complete</button></form>
                <form th:action="@{/observatory/stars/{publicId}/delete(publicId=${star.publicId})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /><button type="submit">Delete</button></form>
            </div>
        </article>
    </div>
</section>
</body>
</html>
