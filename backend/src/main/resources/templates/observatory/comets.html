<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Comets - Observatory</title>
</head>
<body>
<section class="observatory-page">
    <div class="observatory-hero compact">
        <p class="observatory-kicker">Observatory</p>
        <h1>Comets</h1>
        <p>deadlines, exams, appointments, deliveries, and one-time events.</p>
    </div>
    <nav class="observatory-tabs">
        <a th:href="@{/observatory}">Mission Control</a>
        <a th:href="@{/observatory/comets(timeFormat=${timeFormatToggle})}" th:text="|Clock: ${timeFormat}|">Clock: 24h</a>
        <a th:href="@{/observatory/sky-map}">Sky Map</a>
        <a th:href="@{/observatory/pulsars}">Pulsars</a>
    </nav>

    <form class="observatory-form" th:action="${editId == null} ? @{/observatory/comets} : @{/observatory/comets/{publicId}(publicId=${editId})}" th:object="${comet}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <h2 th:text="${editId == null} ? 'Add Comet' : 'Edit Comet'">Add Comet</h2>
        <label>Title <input th:field="*{title}" required></label>
        <label>Description <textarea th:field="*{description}"></textarea></label>
        <label>Type <select th:field="*{type}"><option th:each="type : ${types}" th:value="${type}" th:text="${type}"></option></select></label>
        <label>Date <input type="date" th:field="*{date}" required></label>
        <label>Start <input th:type="${twelveHourClock} ? 'time' : 'text'" th:classappend="${!twelveHourClock} ? 'observatory-time-entry'" th:attr="pattern=${twelveHourClock} ? null : '[0-2][0-9]:[0-5][0-9]', inputmode=${twelveHourClock} ? null : 'numeric'" placeholder="HH:mm" lang="en-GB" th:field="*{startTime}"></label>
        <label>End <input th:type="${twelveHourClock} ? 'time' : 'text'" th:classappend="${!twelveHourClock} ? 'observatory-time-entry'" th:attr="pattern=${twelveHourClock} ? null : '[0-2][0-9]:[0-5][0-9]', inputmode=${twelveHourClock} ? null : 'numeric'" placeholder="HH:mm" lang="en-GB" th:field="*{endTime}"></label>
        <label th:if="${twelveHourClock}">Remind at <input type="datetime-local" lang="en-GB" th:field="*{remindAt}"></label>
        <div class="observatory-datetime-parts" th:unless="${twelveHourClock}">
            <label>Reminder date <input class="observatory-date-entry" type="date" th:value="${comet.remindAt != null ? #temporals.format(comet.remindAt, 'yyyy-MM-dd') : ''}"></label>
            <label>Reminder time <input class="observatory-time-entry" type="text" inputmode="numeric" pattern="[0-2][0-9]:[0-5][0-9]" placeholder="HH:mm" th:value="${comet.remindAt != null ? #temporals.format(comet.remindAt, 'HH:mm') : ''}"></label>
            <input type="hidden" th:field="*{remindAt}">
        </div>
        <label>Priority <select th:field="*{priority}"><option th:each="priority : ${priorities}" th:value="${priority}" th:text="${priority}"></option></select></label>
        <label>Related Star System
            <select name="starSystemId">
                <option value="">None</option>
                <option th:each="starSystem : ${starSystems}" th:value="${starSystem.id}" th:selected="${comet.relatedStarSystem != null and comet.relatedStarSystem.id == starSystem.id}" th:text="${starSystem.name}"></option>
            </select>
        </label>
        <button class="button primary" type="submit" th:text="${editId == null} ? 'Add Comet' : 'Save Comet'">Add Comet</button>
    </form>

    <div class="observatory-table">
        <article class="observatory-row" th:each="comet : ${comets}" th:classappend="${observatoryService.isSupernova(comet)} ? ' supernova-row'">
            <div>
                <strong th:text="${comet.title}">Comet</strong>
                <span th:text="|${comet.date} ${comet.startTime != null ? observatoryService.formatTime(comet.startTime, twelveHourClock) : ''}|">date</span>
                <em th:text="${observatoryService.isSupernova(comet)} ? 'Supernova' : ${comet.type}">type</em>
            </div>
            <div class="row-actions">
                <a class="button" th:href="@{/observatory/comets/{publicId}/edit(publicId=${comet.publicId})}">Edit</a>
                <form th:action="@{/observatory/comets/{publicId}/delete(publicId=${comet.publicId})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /><button type="submit">Delete</button></form>
            </div>
        </article>
    </div>
</section>
</body>
</html>
