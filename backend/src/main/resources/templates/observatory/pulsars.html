<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Pulsars - Observatory</title>
</head>
<body>
<section class="observatory-page">
    <div class="observatory-hero compact">
        <p class="observatory-kicker">Observatory</p>
        <h1>Pulsars</h1>
        <p>flexible recurring targets used by Chart Course to suggest realistic work blocks.</p>
    </div>
    <nav class="observatory-tabs">
        <a th:href="@{/observatory}">Mission Control</a>
        <a th:href="@{/observatory/sky-map}">Sky Map</a>
        <a th:href="@{/observatory/stars}">Stars</a>
        <a th:href="@{/observatory/comets}">Comets</a>
        <a th:href="@{/observatory/chart-course}">Chart Course</a>
    </nav>

    <form class="observatory-form" th:action="${editId == null} ? @{/observatory/pulsars} : @{/observatory/pulsars/{publicId}(publicId=${editId})}" th:object="${pulsar}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <h2 th:text="${editId == null} ? 'Create Pulsar' : 'Edit Pulsar'">Create Pulsar</h2>
        <label>Title <input th:field="*{title}" required></label>
        <label>Description <textarea th:field="*{description}"></textarea></label>
        <label>Target minutes per week <input type="number" min="1" th:field="*{targetMinutesPerWeek}" required></label>
        <label>Minimum session minutes <input type="number" min="15" th:field="*{minimumSessionMinutes}" required></label>
        <label>Maximum session minutes <input type="number" min="15" th:field="*{maximumSessionMinutes}" required></label>
        <label>Energy <select th:field="*{energyType}"><option th:each="energyType : ${energyTypes}" th:value="${energyType}" th:text="${energyType}"></option></select></label>
        <label>Priority <select th:field="*{priority}"><option th:each="priority : ${priorities}" th:value="${priority}" th:text="${priority}"></option></select></label>
        <label>Related Star System
            <select name="starSystemId">
                <option value="">None / preview only</option>
                <option th:each="starSystem : ${starSystems}" th:value="${starSystem.id}" th:selected="${pulsar.starSystem != null and pulsar.starSystem.id == starSystem.id}" th:text="${starSystem.name}"></option>
            </select>
        </label>
        <label class="check-row"><input type="checkbox" th:field="*{active}"> active Pulsar</label>
        <label class="check-row"><input type="checkbox" th:field="*{autoSchedule}"> include in Chart Course</label>
        <button class="button primary" type="submit" th:text="${editId == null} ? 'Create Pulsar' : 'Save Pulsar'">Create Pulsar</button>
    </form>

    <div class="observatory-table">
        <p class="empty-state" th:if="${#lists.isEmpty(pulsars)}">No Pulsars yet.</p>
        <article class="observatory-row" th:each="pulsar : ${pulsars}">
            <div>
                <strong th:text="${pulsar.title}">Pulsar</strong>
                <span th:text="${pulsar.starSystem != null ? pulsar.starSystem.name : 'No Star System linked'}">system</span>
                <em th:text="|${pulsar.targetMinutesPerWeek ?: 0} min weekly / ${pulsar.minimumSessionMinutes ?: 0}-${pulsar.maximumSessionMinutes ?: 0} min sessions / ${pulsar.active ? 'active' : 'inactive'}|">target</em>
            </div>
            <div class="row-actions">
                <a class="button" th:href="@{/observatory/pulsars/{publicId}/edit(publicId=${pulsar.publicId})}">Edit</a>
                <form th:action="@{/observatory/pulsars/{publicId}/toggle(publicId=${pulsar.publicId})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /><button type="submit">Toggle</button></form>
                <form th:action="@{/observatory/pulsars/{publicId}/delete(publicId=${pulsar.publicId})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /><button type="submit">Delete</button></form>
            </div>
        </article>
    </div>
</section>
</body>
</html>
