<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Orbits - Observatory</title>
</head>
<body>
<section class="observatory-page">
    <div class="observatory-hero compact">
        <p class="observatory-kicker">Observatory</p>
        <h1>Orbits</h1>
        <p>recurring fixed routine blocks that occupy your sky.</p>
    </div>
    <nav class="observatory-tabs">
        <a th:href="@{/observatory}">Mission Control</a>
        <a th:href="@{/observatory/sky-map}">Sky Map</a>
        <a th:href="@{/observatory/pulsars}">Pulsars</a>
    </nav>
    <div class="clock-setup">
        <span>Clock setup</span>
        <a class="button" th:href="@{/observatory/orbits(timeFormat=${timeFormatToggle})}" th:text="${timeFormat}">24h</a>
    </div>

    <form class="observatory-form" th:action="${editId == null} ? @{/observatory/orbits} : @{/observatory/orbits/{publicId}(publicId=${editId})}" th:object="${orbit}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <h2 th:text="${editId == null} ? 'Add Orbit' : 'Edit Orbit'">Add Orbit</h2>
        <label>Title <input th:field="*{title}" required></label>
        <label>Description <textarea th:field="*{description}"></textarea></label>
        <label>Kind <select th:field="*{kind}"><option th:each="kind : ${kinds}" th:value="${kind}" th:text="${kind}"></option></select></label>
        <fieldset class="orbit-days">
            <legend th:text="${editId == null} ? 'Days' : 'Day'">Days</legend>
            <label th:each="day : ${days}" class="check-row">
                <input type="checkbox" name="dayOfWeeks" th:value="${day}" th:checked="${orbit.dayOfWeek == day}">
                <span th:text="${day}">MONDAY</span>
            </label>
        </fieldset>
        <label>Start <input th:type="${twelveHourClock} ? 'time' : 'text'" th:classappend="${!twelveHourClock} ? 'observatory-time-entry'" th:attr="pattern=${twelveHourClock} ? null : '[0-2][0-9]:[0-5][0-9]', inputmode=${twelveHourClock} ? null : 'numeric'" placeholder="HH:mm" lang="en-GB" th:field="*{startTime}" required></label>
        <label>End <input th:type="${twelveHourClock} ? 'time' : 'text'" th:classappend="${!twelveHourClock} ? 'observatory-time-entry'" th:attr="pattern=${twelveHourClock} ? null : '[0-2][0-9]:[0-5][0-9]', inputmode=${twelveHourClock} ? null : 'numeric'" placeholder="HH:mm" lang="en-GB" th:field="*{endTime}" required></label>
        <label>Category <select th:field="*{category}"><option th:each="category : ${categories}" th:value="${category}" th:text="${category}"></option></select></label>
        <fieldset class="orbit-colors">
            <legend>Color</legend>
            <label class="orbit-color-option" th:each="color : ${colors}">
                <input type="radio" th:field="*{colorKey}" th:value="${color.value}">
                <span class="orbit-color-swatch" th:style="|--swatch-color: ${color.value}|"></span>
                <span th:text="${color.label}">Ash</span>
            </label>
        </fieldset>
        <label class="check-row"><input type="checkbox" th:field="*{active}"> active Orbit</label>
        <button class="button primary" type="submit" th:text="${editId == null} ? 'Add Orbit' : 'Save Orbit'">Add Orbit</button>
    </form>

    <div class="observatory-table">
        <article th:each="orbit : ${orbits}" class="observatory-row orbit-row" th:style="|--orbit-color: ${observatoryService.orbitColor(orbit.colorKey)}|">
            <div>
                <strong th:text="${orbit.title}">Orbit</strong>
                <span th:text="|${orbit.dayOfWeek} ${observatoryService.formatRange(orbit.startTime, orbit.endTime, twelveHourClock)}|">time</span>
                <em th:text="|${orbit.kind} / ${orbit.active ? 'active' : 'inactive'}|">active</em>
            </div>
            <div class="row-actions">
                <a class="button" th:href="@{/observatory/orbits/{publicId}/edit(publicId=${orbit.publicId})}">Edit</a>
                <form th:action="@{/observatory/orbits/{publicId}/toggle(publicId=${orbit.publicId})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /><button type="submit">Toggle</button></form>
                <form th:action="@{/observatory/orbits/{publicId}/delete(publicId=${orbit.publicId})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /><button type="submit">Delete</button></form>
            </div>
        </article>
    </div>
</section>
</body>
</html>
