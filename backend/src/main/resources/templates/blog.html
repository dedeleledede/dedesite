<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Blog</title>
</head>

<body>
<section class="blog-wall-page">
    <h1>nebula blog</h1>
    <p>posts, updates, logs, and site notes.</p>

    <div class="blog-admin-actions" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
        <a class="button primary" th:href="@{/blog/new}">Nova Postagem</a>
    </div>

    <nav class="blog-pagination top" aria-label="blog pages">
        <a th:if="${currentPage > 0}" th:href="@{/blog(page=${currentPage - 1})}">previous page</a>
        <a th:if="${hasNext}" th:href="@{/blog(page=${currentPage + 1})}">next page</a>
    </nav>

    <div class="blog-post-list" th:if="${posts != null and !#lists.isEmpty(posts)}">
        <article class="blog-card" th:each="post : ${posts}">
            <a class="blog-card-link" th:href="@{'/blog/' + ${post.id}}">
                <time th:datetime="${post.createdAt}" th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy HH:mm')}">Data</time>
                <h2 th:text="${post.title}">Titulo</h2>
                <p th:text="${#strings.abbreviate(post.content, 220)}">excerpt</p>
                <span>read post</span>
            </a>

            <form th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                  th:action="@{'/blog/delete/' + ${post.id}}"
                  method="post"
                  class="blog-delete-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" onclick="return confirm('Tem certeza que deseja apagar esta postagem?')">Apagar</button>
            </form>
        </article>
    </div>

    <div class="blog-empty" th:if="${posts == null or #lists.isEmpty(posts)}">
        <p>Nenhuma postagem por enquanto.</p>
    </div>

    <nav class="blog-pagination" aria-label="blog pages">
        <a th:if="${currentPage > 0}" th:href="@{/blog(page=${currentPage - 1})}">previous page</a>
        <a th:if="${hasNext}" th:href="@{/blog(page=${currentPage + 1})}">next page</a>
    </nav>
</section>
</body>
</html>
